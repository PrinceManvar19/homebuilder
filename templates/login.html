<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Home Builder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #d4a853;
            --accent-hover: #b8942e;
            --text-dark: #0f172a;
            --text-light: #64748b;
            --bg-light: #f8fafc;
            --success-bg: #dcfce7;
            --success-text: #166534;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.15);
            --transition: all 0.3s ease;
            --font-heading: 'Outfit', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 50px 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent), #f0d78c);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.3rem;
        }
        .login-header h1 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 8px;
        }
        .login-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .credentials-box {
            background: var(--success-bg);
            border: 2px solid #bbf7d0;
            border-radius: var(--radius-md);
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .credentials-box .icon {
            font-size: 1.8rem;
            color: var(--success-text);
            margin-bottom: 12px;
        }
        .credentials-box h3 {
            color: var(--success-text);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            font-family: var(--font-heading);
        }
        .credentials-box .creds {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 8px;
            font-family: monospace;
            font-size: 0.95rem;
            color: var(--primary);
            font-weight: 500;
        }
        .credentials-box .warning {
            font-size: 0.85rem;
            color: #92400e;
            background: #fef3c7;
            padding: 8px;
            border-radius: 6px;
            border-left: 4px solid #f59e0b;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-dark);
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: var(--primary);
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }
        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--primary);
        }
        .alert {
            padding: 14px 18px;
            background: #fee2e2;
            color: #dc2626;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <a href="/" class="logo">
                    <span class="logo-icon"><i class="fas fa-cube"></i></span>
                    <span>Home<span style="color: var(--accent)">Builder</span>
                </a>
                <h1>Admin Login</h1>
                <p>Enter your credentials to access dashboard</p>
            </div>
            
            <div class="credentials-box">
                <div class="icon">📋</div>
                <h3>Default Admin Credentials</h3>
                <div class="creds">
                    <strong>Username:</strong> Admin<br>
                    <strong>Password:</strong> Admin@123
                </div>
                <div class="warning">
                    ⚠️ For local development only. Change password in production!
                </div>
            
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" value="Admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" value="Admin@123" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            <a href="/" class="back-link">← Back to Home</a>
        </div>
</body>
</html>
